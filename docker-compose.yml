services:
  voicebox:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped

    expose:
      - "17493"

    volumes:
      - voicebox-data:/app/data
      - huggingface-cache:/home/voicebox/.cache/huggingface

    environment:
      - LOG_LEVEL=info
      - NUMBA_CACHE_DIR=/tmp/numba_cache
      - VOICEBOX_MODELS_DIR=/home/voicebox/.cache/huggingface
      - DEVICE=cpu

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:17493/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 8G
        reservations:
          cpus: "1"
          memory: 4G

volumes:
  voicebox-data:
  huggingface-cache:
