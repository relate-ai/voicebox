services:
  voicebox:
    build:
      context: .
      dockerfile: Dockerfile
    user: "0:0"
    restart: unless-stopped

    expose:
      - "17493"

    volumes:
      - /data/working/voicebox:/app/data/generations
      - voicebox-data:/app/data
      - huggingface-cache:/home/voicebox/.cache/huggingface

    environment:
      - LOG_LEVEL=info
      - NUMBA_CACHE_DIR=/tmp/numba_cache
      - VOICEBOX_MODELS_DIR=/home/voicebox/.cache/huggingface
      - DEVICE=cpu

    command:
      - sh
      - -c
      - |
        mkdir -p /app/data/generations /app/data/profiles /app/data/cache /home/voicebox/.cache/huggingface
        chown -R voicebox:voicebox /app/data /home/voicebox/.cache
        su voicebox -s /bin/bash -c 'exec uvicorn backend.main:app --host 0.0.0.0 --port 17493'

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:17493/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

    deploy:
      resources:
        limits:
          cpus: "6"
          memory: 12G
        reservations:
          cpus: "2"
          memory: 6G

volumes:
  voicebox-data:
  huggingface-cache:
