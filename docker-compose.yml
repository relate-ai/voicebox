x-voicebox-build: &voicebox-build
  context: .
  dockerfile: Dockerfile

x-voicebox-volumes: &voicebox-volumes
  - voicebox-data:/app/data
  - huggingface-cache:/home/voicebox/.cache/huggingface

services:
  voicebox-permissions:
    build: *voicebox-build
    user: "0:0"
    command:
      - sh
      - -c
      - |
        mkdir -p /app/data/generations /app/data/profiles /app/data/cache /home/voicebox/.cache/huggingface
        chown -R voicebox:voicebox /app/data /home/voicebox/.cache
    volumes: *voicebox-volumes
    restart: "no"

  voicebox:
    build: *voicebox-build
    restart: unless-stopped

    depends_on:
      voicebox-permissions:
        condition: service_completed_successfully

    expose:
      - "17493"

    volumes: *voicebox-volumes

    environment:
      - LOG_LEVEL=info
      - NUMBA_CACHE_DIR=/tmp/numba_cache
      - VOICEBOX_MODELS_DIR=/home/voicebox/.cache/huggingface
      - DEVICE=cpu

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:17493/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 8G
        reservations:
          cpus: "1"
          memory: 4G

volumes:
  voicebox-data:
  huggingface-cache:
